<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monaco Editor (Safari 本地版)</title>
    <style>
        /* 最简全屏布局 */
        html, body, #editor {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1e1e1e; /* 默认深色背景 */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
    </style>
</head>
<body>
    <div id="editor"></div>

    <!-- 1. 引用项目中本地的 loader.js -->
    <script src="./vs/loader.js"></script>
    
    <script>
        // 2. 配置 require 路径指向本地目录
        require.config({
            paths: {
                vs: "./vs"
            }
        });

        // 3. 启动编辑器
        require(["vs/editor/editor.main"], () => {
            // 取消 JSON 默认语法检查（视需求可以保留或开启）
            monaco.languages.json.jsonDefaults.setDiagnosticsOptions({
                validate: false,
                allowComments: false,
                schemas: [],
                enableSchemaRequest: false
            });

            // 初始化编辑器实例
            const editor = monaco.editor.create(document.getElementById("editor"), {
                value: '{\n    "status": "ready",\n    "message": "Hello from Safari with local JS!"\n}',
                language: 'json',
                theme: 'vs-dark', // 使用内置的深色主题
                automaticLayout: true,
                wordWrap: "on",
                minimap: { enabled: false }, // 关闭右侧代码缩略图
                fontSize: 14,
                fontFamily: "SFMono-Regular, Menlo, Monaco, monospace",
                lineNumbers: "on",
                tabSize: 4,
                insertSpaces: true,
                padding: { top: 12, bottom: 12 },
                scrollBeyondLastLine: false,
                smoothScrolling: true
            });

            // 如果你想监听代码变化，可以在这里添加：
            editor.onDidChangeModelContent(() => {
                console.log("当前内容:", editor.getValue());
            });
        });
    </script>
</body>
</html>
